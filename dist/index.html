    <style>
        html {
            background-color: black;
            font-family: monospace;
            color: white;
            user-select: none;
        }

        canvas {
            display: block;
            position: fixed;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            margin: auto;
            padding: 0;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            height: 100%;
        }

        button {
            transition: background-color 200ms;
            font-family: monospace;
            cursor: pointer;
            padding: 4px;
            margin: 2px;
            border: 2px solid #333;
            border-radius: 5px;
            background-color: #ead598;
        }

        button:hover {
            background-color: #f3cf84;
        }

        button:active {
            background-color: #f0a15b;
        }

        input[type="range"] {
            accent-color: #2be77c;
        }

        #debugContainer {
            display: inline;
            position: fixed;
            font-family: monospace;
            background-color: #0003;
            color: white;
            bottom: 40px;
            left: 10px;
            z-index: 9999;
            padding: 15px;
            flex-direction: column;
            gap: 12px;
            border-radius: 25px;
        }

        ::selection {
            background-color: white;
        }

        #text1,
        #text2,
        #text3,
        #text4,
        #logicText,
        #renderText {
            position: fixed;
            font-family: monospace;
            user-select: text;
            font-size: 20px;
            padding: 2px;
            margin: 4px;
            line-height: 1.1;
            transition: background-color 250ms;
            background-color: #0008;
            border-radius: 4px;
            white-space: pre-wrap;
        }

        #text1,
        #text2,
        #text3,
        #text4 {
            position: relative;
            display: inline-block;
            max-width: 45%;
        }

        #textTop,
        #textBottom {
            position: fixed;
            display: flex;
            justify-content: space-between;
            width: calc(100% - 8px);
            flex-wrap: wrap;
        }

        #textTop {
            top: 20px;
            left: 4px;
        }

        #textBottom {
            bottom: 4px;
            left: 4px;
        }

        #text1:hover,
        #text2:hover,
        #text3:hover,
        #text4:hover {
            background-color: #000c;
        }

        #text1 {
            color: oklch(0.6676 0.3059 355);
        }

        #text2 {
            color: oklch(80.741% 0.1621 86);
        }

        #text3 {
            color: oklch(76.85% 0.2277 145);
        }

        #text4 {
            color: oklch(0.5971 0.1875 245);
        }

        #logicText {
            top: -6px;
            left: -3px;
            font-size: 12px;
        }

        #renderText {
            top: -6px;
            right: -3px;
            font-size: 12px;
        }
    </style>
